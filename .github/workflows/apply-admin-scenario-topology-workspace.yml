name: Apply admin scenario topology workspace patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-admin-scenario-topology-workspace.yml
      - simu-ssi/scripts/fix-admin-scenario-topology-workspace.mjs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply admin scenario topology workspace patch
        working-directory: simu-ssi
        run: node scripts/fix-admin-scenario-topology-workspace.mjs

      - name: Commit patch result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add simu-ssi/apps/admin-studio/src/pages/AdminStudioApp.tsx
          git commit -m "fix: load scenario topology in admin workspace"
          git push
